services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_SECRET: ${APP_SECRET}
      TASKPULSE_CORS_ORIGIN: ${TASKPULSE_CORS_ORIGIN}
      PORT: 3001
    volumes:
      - ../../:/app
    command: >
      sh -c "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @taskpulse/api prisma:generate &&
      pnpm --filter @taskpulse/api prisma migrate deploy &&
      pnpm --filter @taskpulse/api build &&
      pnpm --filter @taskpulse/api start:prod"

  web:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PORT: 3000
    volumes:
      - ../../:/app
    command: >
      sh -c "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @taskpulse/web build &&
      pnpm --filter @taskpulse/web start"

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    environment:
      TASKPULSE_DOMAIN: ${TASKPULSE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
