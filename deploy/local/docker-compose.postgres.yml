services:
  postgres:
    image: postgres:17
    pull_policy: never
    container_name: taskpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskpulse
      POSTGRES_USER: taskpulse
      POSTGRES_PASSWORD: taskpulse
    ports:
      - "55432:5432"
    volumes:
      - taskpulse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskpulse -d taskpulse"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  taskpulse-postgres-data:
